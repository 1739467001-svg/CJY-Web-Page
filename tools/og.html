<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: #F7F2E4; color: #14110B; position: relative; overflow: hidden;
    background-image:
      linear-gradient(rgba(20,17,11,.05) 1.5px, transparent 1.5px),
      linear-gradient(90deg, rgba(20,17,11,.05) 1.5px, transparent 1.5px);
    background-size: 34px 34px;
  }
  .frame {
    position: absolute; inset: 22px; border: 6px solid #14110B; border-radius: 26px;
    padding: 50px 58px; display: flex; flex-direction: column; justify-content: space-between;
    overflow: hidden;
  }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .badge { font: 700 19px/1 "JetBrains Mono", monospace; background: #C8FF2D; border: 3px solid #14110B;
    border-radius: 999px; padding: 12px 20px; box-shadow: 5px 5px 0 #14110B; }
  .vibe { font: 800 22px/1 monospace; letter-spacing: 3px; color: #5C564A; padding-top: 6px; }
  .cjy { font-family: "Arial Black", system-ui, sans-serif; font-weight: 900; font-size: 196px; line-height: .82;
    color: #FF4D1C; text-shadow: 8px 8px 0 #14110B; -webkit-text-stroke: 2px #14110B; letter-spacing: -4px; }
  .cn { font-weight: 900; font-size: 104px; line-height: 1; margin-top: 8px; }
  .cn mark { background: #C8FF2D; color: #14110B; padding: 2px 12px; border-radius: 8px; }
  .tag { font-weight: 700; font-size: 28px; margin-top: 24px; max-width: 760px; }
  .tag b { border-bottom: 5px solid #FF4D1C; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .stats { display: flex; gap: 16px; }
  .stat { border: 3px solid #14110B; border-radius: 14px; box-shadow: 5px 5px 0 #14110B; padding: 10px 20px; text-align: center; }
  .stat b { font-size: 34px; font-weight: 900; }
  .stat span { display: block; font: 700 14px/1 monospace; margin-top: 5px; }
  .s1 { background: #FF4D1C; color: #F7F2E4; }
  .s2 { background: #2B47F0; color: #F7F2E4; }
  .s3 { background: #C8FF2D; }
  .url { font: 700 22px/1 monospace; color: #5C564A; }
  .lob { position: absolute; right: 34px; top: 150px; font-size: 240px; transform: rotate(12deg);
    filter: drop-shadow(7px 7px 0 rgba(20,17,11,.25)); }
</style>
</head>
<body>
  <div class="frame">
    <div class="top">
      <span class="badge">● 浙江工商大学 · 信电人工智能学院 · 研究生</span>
      <span class="vibe">VIBE CODER 🦞</span>
    </div>
    <div>
      <div class="cjy">CJY</div>
      <div class="cn"><mark>陈俊烨</mark></div>
      <div class="tag">用 AI 重新想象「教与学」—— <b>AI 教育数字化</b> · <b>未来课堂</b> · <b>AI 多模态</b></div>
    </div>
    <div class="bottom">
      <div class="stats">
        <div class="stat s1"><b>19+</b><span>黑客松</span></div>
        <div class="stat s2"><b>6+</b><span>获奖</span></div>
        <div class="stat s3"><b>8+</b><span>上线项目</span></div>
      </div>
      <div class="url">cjy-self-production.zeabur.app</div>
    </div>
    <div class="lob">🦞</div>
  </div>
</body>
</html>
